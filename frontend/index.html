i<!DOCTYPE html>
<html>
<body>
<h2>Frontend App</h2>
<button onclick="callAPI()">Call Backend</button>
<p id="result"></p>

<script>
function callAPI() {
  fetch('/api')
    .then(res => res.json())
    .then(data => {
      document.getElementById("result").innerText = data.message;
    });
}
</script>
</body>
</html>
